<div class="contact-page">
  <div class="contact-heading">
    <h1 class="contact-title">.Contact</h1>
    <p class="contact-subtitle">Let's connect</p>
  </div>

  <div class="contact-form-container">
    <form action="https://formsubmit.co/juwaiedz@gmail.com" method="POST" class="contact-form">
      <div class="form-field">
        <input type="text" name="name" placeholder="Full Name" id="name" required>
      </div>

      <div class="form-field">
        <input type="email" name="email" placeholder="Email" id="email" required>
      </div>

      <div class="form-field">
        <input type="text" name="subject" placeholder="Subject" id="subject" required>
      </div>

      <div class="form-field">
        <textarea name="message" id="Message" placeholder="Message" required></textarea>
      </div>

      <div class="form-field">
        <button type="submit" class="contact-submit">Send</button>
      </div>
    </form>
  </div>
</div>
