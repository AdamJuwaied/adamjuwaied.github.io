<!-- ═══ Ambient gold shimmer ═══ -->
<canvas #shimmerCanvas class="about-shimmer"></canvas>

<!-- ═══ Hero — Field Background with Parallax ═══ -->
<section class="about-hero">
  <div class="about-hero__bg" style="background-image: url('images/FieldBackground.JPG')"></div>
  <div class="about-hero__overlay"></div>

  <div class="about-hero__content">
    <h1 class="about-hero__title">print<span class="gold-paren">(</span>aboutMe<span class="gold-paren">)</span></h1>
    <div class="about-hero__rule"></div>
    <p class="about-hero__sub">Learn About Me!</p>
  </div>

  <div class="about-hero__scroll-hint" id="arrows"></div>
</section>

<!-- ═══ Origin Section ═══ -->
<section class="about-origin">
  <div class="about-origin__inner">
    <div class="about-origin__img-wrap">
      <img src="images/Petra-Jordan.png" alt="Petra, Jordan" class="about-origin__petra" />
    </div>
    <div class="about-origin__text">
      <h3 class="section-heading">From New York</h3>
      <p class="section-sub">Ethnically Jordanian</p>
    </div>
  </div>
</section>

<!-- ═══ Parallax Gallery ═══ -->
<section class="about-gallery">
  <div class="about-gallery__header">
    <span class="gold-rule"></span>
    <h3 class="section-heading">Moments</h3>
    <span class="gold-rule"></span>
  </div>

  <div class="about-gallery__grid">
    <div class="parallax-card" data-speed="0.12">
      <div class="parallax-card__frame">
        <img src="images/SlowDancing.JPG" alt="Slow Dancing" />
      </div>
    </div>
    <div class="parallax-card" data-speed="0.08">
      <div class="parallax-card__frame">
        <img src="images/DisneySunshine.JPG" alt="Disney Sunshine" />
      </div>
    </div>
    <div class="parallax-card" data-speed="0.1">
      <div class="parallax-card__frame">
        <img src="images/DisneyStitch.JPG" alt="Disney Stitch" />
      </div>
    </div>
    <div class="parallax-card" data-speed="0.12">
      <div class="parallax-card__frame">
        <img src="images/PopstarShot.JPG" alt="Popstar Shot" />
      </div>
    </div>
  </div>
</section>

<!-- ═══ Hobbies — Beach Background ═══ -->
<section class="about-hobbies">
  <div class="about-hobbies__bg" style="background-image: url('images/BeachBackground.jpg')"></div>
  <div class="about-hobbies__overlay"></div>

  <div class="about-hobbies__content">
    <h3 class="section-heading">My Hobbies</h3>
    <ul class="hobbies-list">
      <li>I love spending time with friends and family</li>
      <li>Big on philosophical conversations, seeing different perspectives</li>
      <li>Traveling and exploring new places</li>
      <li>Mostly, I love to code!</li>
    </ul>
  </div>
</section>
